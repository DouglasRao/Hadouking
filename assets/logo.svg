<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4500"/>
      <stop offset="50%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b68ee"/>
      <stop offset="100%" style="stop-color:#ff6ec7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="16" fill="#0d1117"/>
  <rect width="800" height="220" rx="16" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Hadouken fireball symbol -->
  <g transform="translate(95, 110)" filter="url(#strongGlow)">
    <!-- Outer energy ring -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#fireGrad)" stroke-width="3" opacity="0.5">
      <animate attributeName="r" values="52;56;52" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner energy core -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="url(#fireGrad)" stroke-width="2.5" opacity="0.7">
      <animate attributeName="r" values="35;38;35" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Core orb -->
    <circle cx="0" cy="0" r="22" fill="url(#fireGrad)" opacity="0.9">
      <animate attributeName="r" values="22;25;22" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Center bright spot -->
    <circle cx="0" cy="0" r="8" fill="#fff" opacity="0.95">
      <animate attributeName="opacity" values="0.95;0.7;0.95" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Energy trails -->
    <line x1="55" y1="-15" x2="75" y2="-20" stroke="#ffd700" stroke-width="2" opacity="0.6" stroke-linecap="round">
      <animate attributeName="x2" values="75;85;75" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="55" y1="0" x2="80" y2="0" stroke="#ff8c00" stroke-width="2.5" opacity="0.7" stroke-linecap="round">
      <animate attributeName="x2" values="80;92;80" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="55" y1="15" x2="75" y2="20" stroke="#ff4500" stroke-width="2" opacity="0.6" stroke-linecap="round">
      <animate attributeName="x2" values="75;85;75" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Title -->
  <text x="185" y="105" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="3">
    HADOUKING
  </text>

  <!-- Tagline -->
  <text x="190" y="142" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="16" fill="#8b949e" letter-spacing="4">
    AUTONOMOUS PENTEST AGENTS
  </text>

  <!-- Subtle animated scan line -->
  <rect x="185" y="155" width="0" height="1.5" rx="1" fill="url(#textGrad)" opacity="0.6">
    <animate attributeName="width" values="0;460;460;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Version badge -->
  <g transform="translate(640, 170)">
    <rect x="0" y="0" width="80" height="22" rx="4" fill="#238636" opacity="0.8"/>
    <text x="40" y="15" font-family="'SF Mono', monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">v2.0</text>
  </g>

  <!-- Python badge -->
  <g transform="translate(640, 198)">
    <rect x="0" y="0" width="80" height="22" rx="4" fill="#3572A5" opacity="0.8"/>
    <text x="40" y="15" font-family="'SF Mono', monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">Python 3.10+</text>
  </g>
</svg>
